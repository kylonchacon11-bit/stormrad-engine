<!DOCTYPE html>
<html>
<head>
    <title>Pro-Level Live Radar</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>body { margin:0; } #map { height: 100vh; width: 100%; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Use a high-performance vector map
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [-95.3698, 29.7604], zoom: 7
        });

        // Use deck.gl for GPU-accelerated layers
        const { Deck, ScatterplotLayer } = deck;
        const deckOverlay = new deck.MapboxOverlay({
            layers: []
        });
        map.addControl(deckOverlay);

        async function loadRadar() {
            // Fetch the latest index file to find the newest scan
            const response = await fetch('https://noaa-nexrad-level2.s3.amazonaws.com/');
            // NOTE: In a real app, you'd use a serverless function here to parse the XML.
            // For TONIGHT'S progress, let's inject a static sample of high-res data.
            console.log("Pipeline bypassed. Rendering raw data direct to GPU...");
            
            // This represents the raw gates you would process
            const rawData = [
                { lat: 29.7604, lon: -95.3698, dbz: 65 },
                { lat: 29.8000, lon: -95.4000, dbz: 55 }
            ];

            const layer = new ScatterplotLayer({
                id: 'pro-radar',
                data: rawData,
                getPosition: d => [d.lon, d.lat],
                getFillColor: d => d.dbz > 60 ? [255, 0, 0] : [0, 255, 0],
                getRadius: 500,
                pickable: true
            });
            deckOverlay.setProps({ layers: [layer] });
        }
        
        map.on('load', loadRadar);
    </script>
</body>
</html>
