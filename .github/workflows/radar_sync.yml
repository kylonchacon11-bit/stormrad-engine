name: StormRad Automated Data Pipeline
on:
  schedule:
    - cron: '*/5 * * * *'  # Trigger automatically every 5 minutes, 24/7
  workflow_dispatch:      # Installs a manual override "Run Now" button inside your dashboard

jobs:
  process-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Serverless Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libhdf5-dev

      - name: Inject Meteorological Core Packages
        run: |
          python -m pip install --upgrade pip
          pip install numpy shapely bzip2file netCDF4 geojson boto3 botocore arm-pyart

      - name: Run Processing Engine
        run: python process_radar.py

      - name: Push Live Data to Web Layer
        run: |
          git config --global user.name "StormRad Automated Sync"
          git config --global user.email "bot@stormrad.internal"
          git add public/latest_radar.json
          git commit -m "Pipeline Sync: New radar sweep compiled [Skip CI]" || exit 0
          git push
