<!DOCTYPE html>
<html>
<head>
    <title>StormRad Live</title>
    <meta charset="utf-8">
    <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-95.3698, 29.7604], // Houston Coordinates
            zoom: 7
        });

        map.on('load', async () => {
            const response = await fetch('./public/latest_radar.json');
            const data = await response.json();
            
            map.addSource('radar', { type: 'geojson', data: data });
            map.addLayer({
                'id': 'radar-layer',
                'type': 'circle',
                'source': 'radar',
                'paint': { 'circle-radius': 3, 'circle-color': '#007cbf' }
            });
        });
    </script>
</body>
</html>
